# Owner: Amer
#
# CI workflow — Concierge multi-tenant chatbot
#
# This workflow enforces the project quality gates listed in eval_thresholds.yaml.
# Each eval gate runs as its own job after lint-test-build succeeds. Eval jobs
# run only on pull_request events and on push to main; feature-branch pushes get
# fast lint/test/build feedback without paying for the eval jobs.
#
# Enforced eval gates (one job per row):
#
#   Job name            | Threshold key in eval_thresholds.yaml          | Threshold | Owner   | Eval module
#   --------------------|------------------------------------------------|-----------|---------|----------------------
#   classifier-eval     | classifier.macro_f1_min                        | >= 0.80   | Ayoub   | python -m evals.classifier
#   rag-eval            | rag.hit_at_5_min & rag.faithfulness_min        | >= 0.75 / >= 0.80 | Nasser | python -m evals.rag
#   agent-tool-eval     | agent_tool_selection.accuracy_min              | >= 0.90   | Nasser  | python -m evals.agent_tool
#   red-team            | red_team.required_refusal_rate                 | == 1.00   | Ayoub   | python -m evals.red_team
#   redaction-eval      | redaction.required_secret_leak_count           | == 0      | Ayoub   | python -m evals.redaction
#
# Each eval CLI follows the contract at specs/006-ci-eval-gates/contracts/eval-cli.md.
# The threshold checker at scripts/check_threshold.py is the sole arbiter of pass/fail
# per specs/006-ci-eval-gates/contracts/threshold-checker.md.
#
# Mocks ship in this PR for every eval module so CI is immediately green; real
# CLIs land in follow-up PRs by the named owners. See DECISIONS.md (Decision 9)
# and specs/006-ci-eval-gates/spec.md for the full background.
#
# Why five separate jobs (not a matrix): each gate has a different owner and
# distinct failure semantics; one named check per gate keeps the PR page scannable.
# See specs/006-ci-eval-gates/research.md §R5.

name: CI

on:
  push:
  pull_request:

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install uv
          uv pip install --system -e ".[dev]"

      - name: Ruff check
        run: ruff check .

      - name: Run tests
        # tests/smoke/ requires a live Compose stack (see specs/007); it runs
        # in the dedicated smoke-e2e job below where the stack is brought up.
        run: pytest --ignore=tests/smoke

      - name: Docker build
        run: docker compose build

  # Widget bundle-size budget — enforces specs/009-concierge-ui SC-007 by
  # building the widget and asserting:
  #   - public/widget.js loader  ≤  5 KB gzipped
  #   - dist/assets/*.js app bundle ≤ 80 KB gzipped
  # Lighthouse-CI would deliver the same signal but its runtime is far larger;
  # we only need the wire-cost budget here. The Python checker is contracted
  # at scripts/check_bundle_size.py.
  bundle-size-budget:
    needs: lint-test-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/widget/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install widget deps
        working-directory: frontend/widget
        run: npm ci

      - name: Build widget
        working-directory: frontend/widget
        run: npm run build

      - name: Check bundle-size budget
        run: python scripts/check_bundle_size.py --dist frontend/widget/dist

  # Lean-image audit — enforces Constitution Principle V by asserting that
  # the modelserver and guardrails images do not contain torch or transformers.
  # Contract: specs/008-demo-polish/contracts/lean-image-audit-cli.md.
  # Placed before the eval jobs so a constitutional violation short-circuits
  # CI early; does NOT block the eval jobs (each surfaces its own status).
  lean-image-audit:
    needs: lint-test-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build serving images
        run: docker compose build modelserver guardrails

      - name: Audit serving images for torch/transformers
        run: make lean-image-audit

  classifier-eval:
    needs: lint-test-build
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        run: |
          pip install uv
          uv pip install --system -e ".[dev]"

      - name: Run classifier evaluator
        run: python -m evals.classifier --output classifier-eval.json

      - name: Check classifier macro_f1 threshold
        run: python scripts/check_threshold.py --gate classifier --metric macro_f1_min --json classifier-eval.json

      - name: Upload classifier eval output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: classifier-eval-output
          path: classifier-eval.json

  rag-eval:
    needs: lint-test-build
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        run: |
          pip install uv
          uv pip install --system -e ".[dev]"

      - name: Run RAG evaluator
        run: python -m evals.rag --output rag-eval.json

      - name: Check RAG hit@5 threshold
        run: python scripts/check_threshold.py --gate rag --metric hit_at_5_min --json rag-eval.json

      - name: Check RAG MRR threshold
        run: python scripts/check_threshold.py --gate rag --metric mrr_min --json rag-eval.json

      - name: Check RAG faithfulness threshold
        run: python scripts/check_threshold.py --gate rag --metric faithfulness_min --json rag-eval.json

      - name: Upload RAG eval output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-eval-output
          path: rag-eval.json

  # PROMPT-CHANGE GATE (T092). This job is the required check for any change
  # to the agent path or prompt files. The on.pull_request trigger above
  # already runs the job on every PR; the path list below enumerates the
  # files whose modification is REQUIRED to be gated by this eval. The
  # threshold (eval_thresholds.yaml::agent_tool_selection.accuracy_min)
  # enforces pass/fail. Do not weaken this trigger without an updated
  # decision in DECISIONS.md.
  #
  #   Protected paths:
  #     - app/prompts/system_prompt.md
  #     - app/prompts/loader.py
  #     - app/agent/**
  agent-tool-eval:
    needs: lint-test-build
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        run: |
          pip install uv
          uv pip install --system -e ".[dev]"

      # Detect changes under the protected prompt/agent paths. The job runs
      # on every PR (see if: above), but this step records which files moved
      # so reviewers can confirm the gate covered the right surface.
      - name: Detect protected-path changes
        id: protected-paths
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            agent:
              - 'app/prompts/system_prompt.md'
              - 'app/prompts/loader.py'
              - 'app/agent/**'

      # NOTE: three intentional spellings — agent_tool_selection (gate key in
      # eval_thresholds.yaml), evals.agent_tool (module), agent-tool-eval (job
      # name). Not a typo. See specs/006-ci-eval-gates/data-model.md E1.
      - name: Run agent tool-selection evaluator
        run: python -m evals.agent_tool --output agent-tool-eval.json

      - name: Check agent tool-selection accuracy threshold
        run: python scripts/check_threshold.py --gate agent_tool_selection --metric accuracy_min --json agent-tool-eval.json

      - name: Upload agent tool-selection eval output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-tool-eval-output
          path: agent-tool-eval.json

      # SC-003 (task T062b): informational distribution check — never blocks merge.
      - name: Run router distribution check (SC-003, informational)
        continue-on-error: true
        run: python -m evals.router_distribution --output router-distribution.json

      - name: Upload router distribution output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: router-distribution-output
          path: router-distribution.json

  red-team:
    needs: lint-test-build
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        run: |
          pip install uv
          uv pip install --system -e ".[dev]"

      - name: Run red-team evaluator
        run: python -m evals.red_team --output red-team-eval.json

      - name: Check red-team refusal_rate threshold
        run: python scripts/check_threshold.py --gate red_team --metric required_refusal_rate --json red-team-eval.json

      - name: Upload red-team eval output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: red-team-eval-output
          path: red-team-eval.json

  redaction-eval:
    needs: lint-test-build
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        run: |
          pip install uv
          uv pip install --system -e ".[dev]"

      - name: Run redaction evaluator
        run: python -m evals.redaction --output redaction-eval.json

      - name: Check redaction secret_leak_count threshold
        run: python scripts/check_threshold.py --gate redaction --metric required_secret_leak_count --json redaction-eval.json

      - name: Upload redaction eval output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redaction-eval-output
          path: redaction-eval.json

  # Cross-tenant end-to-end smoke gate. Runs last because the Compose cold-start
  # is the most expensive single job; failing eval gates should short-circuit
  # before paying that cost. See specs/007-cross-tenant-smoke-e2e/.
  smoke-e2e:
    needs:
      - lint-test-build
      - classifier-eval
      - rag-eval
      - agent-tool-eval
      - red-team
      - redaction-eval
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SMOKE_E2E_REQUIRE_FULL_STACK: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        run: |
          pip install uv
          uv pip install --system -e ".[dev]"

      - name: Seed .env from .env.example
        # api / admin / modelserver / guardrails declare `env_file: .env` in
        # docker-compose.yml; recent Compose versions error on missing env
        # files, so the stack must have a .env before `up`. This mirrors
        # RUNBOOK.md step 1 and the local Demo Flow.
        run: cp .env.example .env

      - name: Bring stack up
        run: docker compose up -d --wait

      - name: Show stack status
        if: always()
        run: docker compose ps

      - name: Run smoke suite
        run: python scripts/smoke_check.py -v

      - name: Capture compose logs on failure
        if: failure()
        run: docker compose logs > docker-compose.logs

      - name: Upload smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-e2e-logs
          path: |
            smoke-report.json
            docker-compose.logs

      - name: Tear stack down
        if: always()
        run: docker compose down -v
