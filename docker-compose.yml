# Owner: Amer
services:
  # ---------------------------------------------------------------------------
  # One-shot bootstrap: seed Vault, then run alembic migrations.
  # Both services run to completion and exit; the api service waits for both
  # via depends_on/service_completed_successfully so a fresh `docker compose
  # up --build` brings a clean stack up without any manual scripts.
  # ---------------------------------------------------------------------------
  vault-seed:
    build:
      context: .
      target: api
    command: ["python", "-m", "scripts.vault_seed"]
    env_file: .env
    depends_on:
      vault:
        condition: service_healthy
    networks: [concierge-net]
    restart: "no"

  migrations:
    build:
      context: .
      target: api
    command: ["alembic", "upgrade", "head"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      vault-seed:
        condition: service_completed_successfully
    networks: [concierge-net]
    restart: "no"

  api:
    build:
      context: .
      target: api
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy
      vault-seed:
        condition: service_completed_successfully
      migrations:
        condition: service_completed_successfully
      modelserver:
        condition: service_healthy
      guardrails:
        condition: service_started
    networks: [concierge-net]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/openapi.json', timeout=2)\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  admin:
    build:
      context: .
      target: admin
    ports:
      - "${ADMIN_PORT:-8501}:8501"
    env_file: .env
    environment:
      # Inside the compose network the api service is reachable at its
      # service-name hostname; localhost would resolve to the admin container
      # itself. Hardcoded here (not just in .env) so a fresh clone works
      # without per-user env editing.
      CONCIERGE_BACKEND_URL: ${CONCIERGE_BACKEND_URL:-http://api:8000}
    depends_on:
      api:
        condition: service_healthy
    networks: [concierge-net]

  modelserver:
    build:
      context: .
      target: modelserver
    ports:
      - "${MODEL_SERVER_PORT:-8010}:8010"
    env_file: .env
    networks: [concierge-net]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8010/openapi.json', timeout=2)\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  guardrails:
    build:
      context: .
      target: guardrails
    ports:
      - "${GUARDRAILS_PORT:-8020}:8020"
    env_file: .env
    networks: [concierge-net]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8020/openapi.json', timeout=2)\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  widget:
    build:
      context: ./frontend/widget
    ports:
      - "${WIDGET_PORT:-5173}:5173"
    networks: [concierge-net]

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: concierge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [concierge-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d concierge"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      # pgAdmin 8 refuses to accept `.local` (or any TLD on its non-deliverable
      # list) even when CHECK_EMAIL_DELIVERABILITY is False — use a generic
      # TLD here so the container boots without per-user config.
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@concierge.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      # Single-user mode so the default email/password unlock the UI without
      # the extra setup prompt; this is dev-only.
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      # Auto-register the Concierge DB server so it shows up in the sidebar
      # on first boot; the user still types the Postgres password once when
      # connecting (no plaintext password ever leaves this host).
      - ./scripts/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      db:
        condition: service_healthy
    networks: [concierge-net]

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks: [concierge-net]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    networks: [concierge-net]

  vault:
    image: hashicorp/vault:1.16
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-root}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    networks: [concierge-net]
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      retries: 10

networks:
  concierge-net:

volumes:
  postgres_data:
  minio_data:
  pgadmin_data:
